[tox]
envlist = py39, py310, py311, py312
isolated_build = true

[testenv]
deps =
    pytest>=7.0.0
    pytest-cov>=4.0.0
    pytest-mock>=3.10.0
    pytest-xdist>=3.0.0
    requests>=2.0.0
    python-dotenv>=1.0.0
commands =
    pip install -e ".[test]"
    pytest --cov=model_train_protocol --cov-report=xml --cov-report=term

